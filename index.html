<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VisionAI - Smart AI Platform</title>

<meta name="description" content="VisionAI Smart AI Chat Platform">
<meta name="keywords" content="AI chatbot, VisionAI, AI tool">

<meta name="google-site-verification" content="pas4ooNDiCX7RVmnI_K_oU0HatfFwzd_t2dOhLlTRWs" />

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

header{
padding:20px;
font-size:30px;
font-weight:bold;
}

.container{
width:90%;
max-width:700px;
margin:auto;
margin-top:30px;
background:#111;
padding:20px;
border-radius:10px;
}

input{
width:90%;
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
margin:5px;
cursor:pointer;
}

.chatbox{
height:300px;
background:black;
overflow:auto;
padding:10px;
text-align:left;
}

.admin{
background:#111;
padding:20px;
margin-top:30px;
border-radius:10px;
}

footer{
margin-top:50px;
padding:20px;
background:#000;
}

</style>

</head>

<body>

<header>
🚀 VisionAI
</header>


<div class="container">

<h2>Login / Signup</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<br>

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<p id="loginStatus"></p>

</div>



<div class="container">

<h2>AI Chat</h2>

<div class="chatbox" id="chatbox"></div>

<input id="message" placeholder="Ask VisionAI">

<button onclick="send()">Send</button>

</div>



<div class="container">

<h2>User Dashboard</h2>

<p>Status: <span id="status">Free</span></p>

<p>Daily Limit: <span id="limit">5</span></p>

<p>Total Messages: <span id="total">0</span></p>

<button onclick="buyPremium()">Activate Premium</button>

</div>



<div class="admin">

<h2>Admin Panel</h2>

<button onclick="showUsers()">Show Users</button>
<button onclick="reset()">Reset Database</button>

<div id="users"></div>

</div>



<footer>

VisionAI Platform  
Owner: **Rakesh Kumar**  
Developer Support: **Shubham Kumar Yadav**

</footer>


<script>

let users = JSON.parse(localStorage.getItem("users")) || []

let loggedUser = null

let limit = 5
let total = 0

function signup(){

let u = document.getElementById("username").value
let p = document.getElementById("password").value

users.push({user:u,pass:p,premium:false})

localStorage.setItem("users",JSON.stringify(users))

alert("Signup successful")

}

function login(){

let u = document.getElementById("username").value
let p = document.getElementById("password").value

let found = users.find(x=>x.user==u && x.pass==p)

if(found){

loggedUser = found

document.getElementById("loginStatus").innerText="Login Success"

if(found.premium){

limit=999
document.getElementById("status").innerText="Premium"

}

}else{

alert("Login failed")

}

}



function send(){

if(limit<=0){

alert("Daily limit finished")

return

}

let msg = document.getElementById("message").value

let chat = document.getElementById("chatbox")

chat.innerHTML += "<p><b>You:</b> "+msg+"</p>"

let reply = "VisionAI: This is demo AI response."

chat.innerHTML += "<p>"+reply+"</p>"

limit--
total++

document.getElementById("limit").innerText=limit
document.getElementById("total").innerText=total

}



function buyPremium(){

if(!loggedUser){

alert("Login first")

return

}

loggedUser.premium=true

limit=999

document.getElementById("status").innerText="Premium"

localStorage.setItem("users",JSON.stringify(users))

alert("Premium Activated")

}



function showUsers(){

document.getElementById("users").innerText=JSON.stringify(users,null,2)

}



function reset(){

localStorage.clear()

alert("Database cleared")

location.reload()

}

</script>

</body>
</html>
