<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisionAI Pro Max</title>

<meta name="description" content="VisionAI Complete AI SaaS Platform">
<meta name="google-site-verification" content="pas4ooNDiCX7RVmnI_K_oU0HatfFwzd_t2dOhLlTRWs" />

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

header{
background:rgba(0,0,0,0.7);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:7px 14px;
border:none;
border-radius:5px;
cursor:pointer;
}

.gold{background:gold;}
.red{background:red;color:white;}
.orange{background:orange;}
.green{background:green;color:white;}

.container{padding:20px;}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

#chatbox{
height:250px;
overflow:auto;
background:rgba(0,0,0,0.4);
padding:10px;
border-radius:8px;
}

input{
padding:8px;
border-radius:5px;
border:none;
margin:5px 0;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:8px;
border-bottom:1px solid #444;
text-align:center;
}

.stats{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.stat{
flex:1;
min-width:150px;
background:#111;
padding:15px;
border-radius:8px;
text-align:center;
}

#adminPanel{display:none;}
#adminLoginBox{display:none;}
</style>
</head>

<body>

<header>
<h2>🚀 VisionAI Pro Max</h2>
<div>
<button class="green" onclick="showAdminLogin()">Admin</button>
<button class="red" onclick="logout()">Logout</button>
</div>
</header>

<div class="container">

<!-- USER DASHBOARD -->
<div class="card">
<h3>User Dashboard</h3>
<p><b>Name:</b> <span id="name">Loading...</span></p>
<p><b>Email:</b> <span id="email">Loading...</span></p>
<p><b>Role:</b> <span id="role">Free</span></p>
<p><b>Premium Expiry:</b> <span id="expiry">N/A</span></p>
</div>

<!-- CHAT -->
<div class="card">
<h3>AI Chat</h3>
<div id="chatbox"></div>
<br>
<input type="text" id="msg" placeholder="Type message">
<button class="gold" onclick="sendMessage()">Send</button>
</div>

<!-- PREMIUM -->
<div class="card">
<h3>Premium ₹499 - 3 Months</h3>
<p>UPI: 9631535323@upi</p>
<p>Pay & contact admin.</p>
</div>

<!-- ADMIN LOGIN -->
<div class="card" id="adminLoginBox">
<h3>Admin Login</h3>
<input type="password" id="adminPass" placeholder="Enter Admin Password">
<br>
<button class="green" onclick="adminLogin()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div class="card" id="adminPanel">
<h3>⚙️ Admin Panel</h3>

<div class="stats">
<div class="stat">
<h2 id="total">0</h2>
<p>Total Users</p>
</div>
<div class="stat">
<h2 id="free">0</h2>
<p>Free Users</p>
</div>
<div class="stat">
<h2 id="premium">0</h2>
<p>Premium Users</p>
</div>
</div>

<input type="text" id="search" placeholder="Search Email..." onkeyup="searchUser()">

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Role</th>
<th>Expiry</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="users"></tbody>
</table>
</div>

</div>

<script>

let userId = localStorage.getItem("userId");
let ADMIN_PASSWORD = "vision123";  // change this

if(!userId){
alert("Login First");
window.location.href="/login.html";
}

async function loadUser(){
const res = await fetch("/get-user",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({userId})
});
const data = await res.json();

document.getElementById("name").innerText=data.name;
document.getElementById("email").innerText=data.email;
document.getElementById("role").innerText=data.role;
if(data.premiumExpiry)
document.getElementById("expiry").innerText=new Date(data.premiumExpiry).toDateString();
}

async function sendMessage(){
const msg=document.getElementById("msg").value;

const res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg,userId})
});
const data=await res.json();

document.getElementById("chatbox").innerHTML+=
"<p><b>You:</b> "+msg+"</p>"+
"<p><b>AI:</b> "+data.reply+"</p>";

document.getElementById("msg").value="";
}

function showAdminLogin(){
document.getElementById("adminLoginBox").style.display="block";
}

function adminLogin(){
const pass=document.getElementById("adminPass").value;
if(pass===ADMIN_PASSWORD){
document.getElementById("adminPanel").style.display="block";
loadUsers();
alert("Admin Access Granted");
}else{
alert("Wrong Password");
}
}

async function loadUsers(){
const res=await fetch("/admin/users");
const users=await res.json();
window.allUsers=users;

document.getElementById("total").innerText=users.length;
document.getElementById("free").innerText=users.filter(u=>u.role==="free").length;
document.getElementById("premium").innerText=users.filter(u=>u.role==="premium").length;

render(users);
}

function render(users){
let html="";
users.forEach(u=>{
html+=`
<tr>
<td>${u.name}</td>
<td>${u.email}</td>
<td>${u.role}</td>
<td>${u.premiumExpiry?new Date(u.premiumExpiry).toDateString():"N/A"}</td>
<td>
<button class="gold" onclick="activate('${u._id}')">Activate</button>
<button class="orange" onclick="removeP('${u._id}')">Remove</button>
<button class="red" onclick="del('${u._id}')">Delete</button>
</td>
</tr>
`;
});
document.getElementById("users").innerHTML=html;
}

function searchUser(){
const val=document.getElementById("search").value.toLowerCase();
const filtered=allUsers.filter(u=>u.email.toLowerCase().includes(val));
render(filtered);
}

async function activate(id){
await fetch("/activate-premium",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({userId:id})
});
loadUsers();
}

async function removeP(id){
await fetch("/admin/remove-premium",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({userId:id})
});
loadUsers();
}

async function del(id){
if(confirm("Delete user?")){
await fetch("/admin/delete",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({userId:id})
});
loadUsers();
}
}

function logout(){
localStorage.clear();
window.location.href="/login.html";
}

loadUser();

</script>

</body>
</html>
